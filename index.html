<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA Colombia – Inclusión Laboral Sostenible</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purpura-reca: #702A75; /* Color corporativo principal */
            --gris-oscuro: #333333;
            --gris-texto: #444444;
            --blanco: #ffffff;
            --sombra: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--blanco);
            color: var(--gris-texto);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER Y NAVEGACIÓN --- */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--blanco);
            border-bottom: 1px solid #eeeeee;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px var(--sombra);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-container img {
            height: 50px; /* Tamaño del logo reca.png */
            width: auto;
        }

        .logo-tagline {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--gris-oscuro);
        }

        .nav-menu ul {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gris-oscuro);
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: var(--purpura-reca);
        }

        /* Botón Asesoría Ya */
        .btn-asesoria {
            background-color: var(--purpura-reca);
            color: white !important;
            padding: 10px 20px;
            border-radius: 25px;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 700;
            display: inline-block;
        }

        /* Responsivo básico */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .logo-tagline { display: none; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="/" class="logo-container">
            <img src="reca.png" alt="RECA Logo">
            <span class="logo-tagline">Red Empleo con Apoyo</span>
        </a>
        
        <nav class="nav-menu">
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#empresa">Empresa</a></li>
                <li><a href="#candidato">Candidato</a></li>
                <li><a href="#recursos">Recursos</a></li>
                <li><a href="#asesoria" class="btn-asesoria">Asesoría Ya</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
