<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA Colombia – Inclusión Laboral Sostenible</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purpura-reca: #702A75; /* Color corporativo principal */
            --gris-oscuro: #333333;
            --gris-suave: #666666;
            --blanco: #ffffff;
            --sombra: rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--blanco);
            color: var(--gris-oscuro);
        }

        /* --- HEADER / NAVEGACIÓN --- */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 6%;
            background: var(--blanco);
            box-shadow: 0 2px 10px var(--sombra);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-box {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
        }

        .logo-box img {
            height: 50px; /* Tamaño optimizado para el logo */
            width: auto;
        }

        .logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--purpura-reca);
            line-height: 1.2;
        }

        .nav-menu ul {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--gris-oscuro);
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: var(--purpura-reca);
        }

        /* Botón de Asesoría destacado */
        .btn-cta {
            background-color: var(--purpura-reca);
            color: var(--blanco) !important;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 700 !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 13px !important;
            box-shadow: 0 4px 12px rgba(112, 42, 117, 0.2);
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; } /* Ocultar para móvil por ahora */
        }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="#" class="logo-box">
            <img src="reca.png" alt="RECA Colombia">
            <div class="logo-text">Red Empleo<br>con Apoyo</div>
        </a>

        <nav class="nav-menu">
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#empresa">Empresa</a></li>
                <li><a href="#candidato">Candidato</a></li>
                <li><a href="#recursos">Recursos</a></li>
                <li><a href="#asesoria" class="btn-cta">Asesoría Ya</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
