<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA Colombia – Inclusión Laboral Sostenible</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purpura-reca: #702A75; 
            --gris-premium: #2D2D2D;
            --gris-suave: #666666;
            --blanco: #ffffff;
            --sombra-sutil: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: var(--blanco);
            color: var(--gris-premium);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN ESTILIZADA --- */
        .header-estilizado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            background: var(--blanco);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px var(--sombra-sutil);
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-box img {
            height: 45px;
            width: auto;
        }

        .tagline-marca {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2.5px; /* Espaciado premium */
            color: var(--purpura-reca);
        }

        .nav-estilizada ul {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-estilizada a {
            text-decoration: none;
            color: var(--gris-suave);
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        .nav-estilizada a:hover {
            color: var(--purpura-reca);
            letter-spacing: 2px;
        }

        .btn-premium {
            background-color: var(--purpura-reca);
            color: white !important;
            padding: 12px 25px;
            border-radius: 2px; /* Look arquitectónico */
            font-weight: 700 !important;
            font-size: 10px !important;
            box-shadow: 0 10px 20px rgba(112, 42, 117, 0.15);
        }
