<!-- Ejemplo del Paso 1 con estructura de bloques -->
<div class="form-step" id="cap-1">
    <h3>1. Perfil Personal</h3>
    
    <div class="input-field">
        <label>NOMBRE Y APELLIDO *</label>
        <input type="text" id="in-nombre" required placeholder="Ingresa tu nombre completo">
    </div>

    <div class="input-field">
        <label>CÉDULA *</label>
        <input type="text" id="in-cedula" required placeholder="Número de identificación">
    </div>

    <div class="input-field">
        <label>CELULAR *</label>
        <input type="text" id="in-cel" required placeholder="Ej: 300 123 4567">
    </div>

    <div class="input-field">
        <label>RESPONSABLE</label>
        <input type="text" id="in-responsable" placeholder="Nombre de persona de contacto">
    </div>

    <div class="input-field">
        <label>FOTO DE PERFIL</label>
        <input type="file" id="in-foto" accept="image/*">
    </div>
</div>
