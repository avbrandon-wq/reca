<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA - Candidatos</title>
    <link rel="stylesheet" href="candidatos.css">
</head>
<body>
    <div class="main-container">
        <!-- Logo de RECA centrado -->
        <div class="header-reca">
           <img src="../logo_reca.png" alt="Logo RECA" class="logo">
        </div>

        <main id="candidatos-reca">
            <div class="stepper">
                <div class="step active">1. Perfil</div>
                <div class="step">2. Foto</div>
                <div class="step">3. Certificado</div>
                <div class="step">4. Cita</div>
            </div>

            <form id="form-reca">
                <div class="form-step" id="p1">
                    <label>NOMBRE COMPLETO *</label>
                    <input type="text" id="nombre" required placeholder="Ej: Jorge Vargas Posada">
                    <br><br>
                    <label>CORREO ELECTRÓNICO *</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com">
                </div>

                <div class="form-step hidden" id="p2">
                    <label>FOTO DE PERFIL *</label>
                    <input type="file" id="foto" accept="image/*">
                </div>

                <div class="form-step hidden" id="p3">
                    <label>CERTIFICADO DE DISCAPACIDAD (PDF) *</label>
                    <input type="file" id="pdf" accept=".pdf">
                </div>

                <div class="form-step hidden" id="p4">
                    <p>Postulación completada. Selecciona tu fecha de entrevista.</p>
                </div>

                <button type="button" id="btn-siguiente">SIGUIENTE PASO</button>
            </form>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
