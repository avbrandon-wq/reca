<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA - Registro y HV</title>
    <link rel="stylesheet" href="candidatos.css">
</head>
<body>
    <div class="main-layout">
        <!-- LADO IZQUIERDO: FORMULARIO -->
        <section class="form-container">
            <div class="header-reca">
                <img src="../icon_todas.png" alt="Logo RECA" class="logo">
            </div>
            
            <div class="stepper">
                <div class="step active" id="s1">1. Perfil</div>
                <div class="step" id="s2">2. Foto</div>
                <div class="step" id="s3">3. Documentos</div>
            </div>

            <form id="form-reca">
                <div class="form-step" id="p1">
                    <label>NOMBRE COMPLETO *</label>
                    <input type="text" id="in-nombre" required placeholder="Ej: Jorge Vargas Posada">
                    <label>CORREO ELECTRÓNICO *</label>
                    <input type="email" id="in-email" required placeholder="correo@ejemplo.com">
                    <label>TELÉFONO *</label>
                    <input type="text" id="in-tel" required placeholder="300 000 0000">
                </div>

                <div class="form-step hidden" id="p2">
                    <label>SUBIR FOTO DE PERFIL *</label>
                    <input type="file" id="in-foto" accept="image/*">
                </div>

                <div class="form-step hidden" id="p3">
                    <label>CERTIFICADO (PDF) *</label>
                    <input type="file" id="in-pdf" accept=".pdf">
                    <button type="button" onclick="window.print()" class="btn-print">IMPRIMIR HOJA DE VIDA</button>
                </div>

                <button type="button" id="btn-siguiente">SIGUIENTE PASO</button>
            </form>
        </section>

        <!-- LADO DERECHO: VISTA PREVIA HV -->
        <section class="preview-container" id="cv-print">
            <div class="cv-paper">
                <div class="cv-header">
                    <div class="cv-id">ID: <span id="cv-id-num">RECA-2026-001</span></div>
                    <img id="cv-foto-prev" src="" alt="Foto" class="cv-foto-placeholder">
                </div>
                <h2 id="cv-nombre">NOMBRE COMPLETO</h2>
                <hr>
                <p><strong>Email:</strong> <span id="cv-email">---</span></p>
                <p><strong>Teléfono:</strong> <span id="cv-tel">---</span></p>
                <div class="cv-footer">
                    <p>Documento generado por el sistema de gestión RECA</p>
                </div>
            </div>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
