<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECA Colombia – Navegación Fluida</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --purpura-reca: #702A75;
            --gris-suave: #666666;
            --blanco: #ffffff;
            --sombra-sutil: rgba(0, 0, 0, 0.05);
        }

        /* 1. SOLUCIÓN AL SALTO LATERAL */
        html {
            scrollbar-gutter: stable; /* Mantiene el layout fijo aunque la barra de scroll aparezca */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. SOLUCIÓN AL SALTO DE NAVEGACIÓN */
        .header-estilizado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 6%;
            height: 80px; /* Altura fija para evitar saltos de renderizado */
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0; /* CORREGIDO: Siempre debe ser 0 para sticky */
            z-index: 1000;
            box-shadow: 0 2px 15px var(--sombra-sutil);
        }

        .logo-box img { 
            height: 35px; 
            width: auto; 
            display: block;
        }

        .nav-estilizada ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-estilizada a {
            text-decoration: none;
            color: var(--gris-suave);
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .nav-estilizada a:hover {
            color: var(--purpura-reca);
        }

        .btn-asesoria {
            background-color: var(--purpura-reca);
            color: white !important;
            padding: 8px 18px;
            border-radius: 5px;
            font-weight: 800 !important;
        }

        /* Contenedor principal para evitar que el contenido "suba" de golpe */
        main {
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header class="header-estilizado">
        <a href="index.html" class="logo-box">
            <img src="https://raw.githubusercontent.com/avbrandon-wq/reca/main/logo_color.png" alt="RECA Colombia">
        </a>
        <nav class="nav-estilizada">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="empresa.html">Empresa</a></li>
                <li><a href="candidato.html">Candidato</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="#" class="btn-asesoria">CONTACTO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        </main>

</body>
</html>
